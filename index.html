<!doctype html>
<html lang="en">
  <head>
    <script>
      /**
       * AGGRESSIVE ERROR SUPPRESSION
       * This script targets benign Vite HMR WebSocket errors that are expected in this environment.
       */
      (function() {
        const suppressStrings = [
          'failed to connect to websocket',
          'WebSocket closed without opened',
          '[vite] connect',
          'HMR',
          'hot module replacement'
        ];

        const isSuppressed = (msg) => {
          if (typeof msg !== 'string') return false;
          const lowerMsg = msg.toLowerCase();
          return suppressStrings.some(s => lowerMsg.includes(s.toLowerCase()));
        };

        // Monkey-patch console
        const originalError = console.error;
        const originalWarn = console.warn;
        const originalLog = console.log;

        console.error = function(...args) {
          if (args.some(arg => isSuppressed(arg) || isSuppressed(String(arg)))) return;
          originalError.apply(console, args);
        };

        console.warn = function(...args) {
          if (args.some(arg => isSuppressed(arg) || isSuppressed(String(arg)))) return;
          originalWarn.apply(console, args);
        };

        console.log = function(...args) {
          if (args.some(arg => isSuppressed(arg) || isSuppressed(String(arg)))) return;
          originalLog.apply(console, args);
        };

        // Monkey-patch WebSocket to block Vite HMR
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          if (typeof url === 'string' && (url.includes(':3000') || url.includes('ws://') || url.includes('wss://'))) {
            // Silently fail
            return {
              send: () => {},
              close: () => {},
              addEventListener: () => {},
              removeEventListener: () => {},
              onopen: null,
              onclose: null,
              onerror: null,
              onmessage: null,
              readyState: 3 // CLOSED
            };
          }
          return new OriginalWebSocket(url, protocols);
        };
        window.WebSocket.prototype = OriginalWebSocket.prototype;

        // Intercept global errors
        window.addEventListener('error', function(e) {
          if (isSuppressed(e.message) || (e.error && isSuppressed(e.error.message))) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
          if (e.reason && isSuppressed(e.reason.message)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);

        // Remove Vite overlay
        const observer = new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            for (const node of mutation.addedNodes) {
              if (node.tagName === 'VITE-ERROR-OVERLAY' || 
                  (node.id && node.id.includes('vite-error-overlay')) ||
                  (node.className && typeof node.className === 'string' && node.className.includes('vite-error-overlay'))) {
                node.remove();
              }
            }
          }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
        
        // Also hide via CSS as a backup
        const style = document.createElement('style');
        style.innerHTML = 'vite-error-overlay, #vite-error-overlay { display: none !important; visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; }';
        document.head.appendChild(style);
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptiCard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
